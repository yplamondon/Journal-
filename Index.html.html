<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mon Journal Santé</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f1a;
    color: #f0eeff;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  header {
    background: linear-gradient(135deg, #6c47ff, #a855f7);
    padding: 20px 20px 16px;
    text-align: center;
  }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  header p  { font-size: 12px; opacity: 0.75; margin-top: 3px; }

  nav {
    display: flex;
    background: #1a1a2e;
    border-bottom: 1px solid #2a2a3e;
  }
  nav button {
    flex: 1; padding: 12px 4px; background: none; border: none;
    color: #888; font-size: 13px; cursor: pointer; transition: color .2s;
  }
  nav button.active { color: #a78bfa; border-bottom: 2px solid #a78bfa; }

  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* --- FORM --- */
  .card {
    background: #1a1a2e;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 14px;
    border: 1px solid #2a2a3e;
  }
  .card h2 { font-size: 13px; color: #a78bfa; text-transform: uppercase;
              letter-spacing: 0.8px; margin-bottom: 12px; }

  label { display: block; font-size: 14px; margin-bottom: 6px; color: #ccc; }

  .emoji-row {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px;
  }
  .emoji-btn {
    flex: 1; min-width: 52px; padding: 10px 4px;
    background: #0f0f1a; border: 2px solid #2a2a3e;
    border-radius: 12px; font-size: 22px; cursor: pointer;
    text-align: center; transition: border-color .15s, background .15s;
  }
  .emoji-btn.selected { border-color: #a78bfa; background: #2a1a4e; }

  .toggle-row { display: flex; gap: 8px; margin-bottom: 4px; }
  .toggle-btn {
    flex: 1; padding: 10px 6px; background: #0f0f1a;
    border: 2px solid #2a2a3e; border-radius: 10px;
    color: #ccc; font-size: 13px; cursor: pointer;
    transition: border-color .15s, background .15s; text-align: center;
  }
  .toggle-btn.selected { border-color: #a78bfa; background: #2a1a4e; color: #f0eeff; }

  .time-row { display: flex; gap: 10px; }
  .time-row input[type=time] {
    flex: 1; background: #0f0f1a; border: 2px solid #2a2a3e;
    border-radius: 10px; color: #f0eeff; font-size: 16px;
    padding: 10px 12px; outline: none;
  }
  .time-row input[type=time]:focus { border-color: #a78bfa; }

  textarea {
    width: 100%; background: #0f0f1a; border: 2px solid #2a2a3e;
    border-radius: 10px; color: #f0eeff; font-size: 14px;
    padding: 10px 12px; outline: none; resize: none;
    font-family: inherit; min-height: 70px;
  }
  textarea:focus { border-color: #a78bfa; }

  .save-btn {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, #6c47ff, #a855f7);
    border: none; border-radius: 14px; color: white;
    font-size: 16px; font-weight: 700; cursor: pointer;
    margin-top: 4px; letter-spacing: 0.2px;
  }
  .save-btn:active { opacity: 0.85; }

  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: #22c55e; color: white; padding: 10px 24px;
    border-radius: 20px; font-size: 14px; font-weight: 600;
    opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 99;
  }
  .toast.show { opacity: 1; }

  /* --- LOG --- */
  .entry {
    background: #1a1a2e; border-radius: 14px;
    padding: 14px; margin-bottom: 12px;
    border: 1px solid #2a2a3e;
  }
  .entry-date { font-size: 11px; color: #888; margin-bottom: 6px; }
  .entry-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 4px; }
  .entry-pill {
    background: #2a1a4e; border-radius: 8px;
    padding: 3px 10px; font-size: 12px; color: #c4b5fd;
  }
  .entry-note { font-size: 13px; color: #aaa; margin-top: 6px; font-style: italic; }
  .empty { text-align: center; color: #555; font-size: 14px; padding: 40px 0; }

  .del-btn {
    float: right; background: none; border: none;
    color: #555; font-size: 16px; cursor: pointer; padding: 0 0 0 8px;
  }
</style>
</head>
<body>

<header>
  <h1>Mon Journal Santé 💜</h1>
  <p>Suivi quotidien simplifié</p>
</header>

<nav>
  <button class="active" onclick="showPage('form', this)">➕ Entrée</button>
  <button onclick="showPage('log', this)">📋 Historique</button>
</nav>

<!-- FORM PAGE -->
<div id="form" class="page active">

  <div class="card">
    <h2>💊 Médicaments pris</h2>
    <div class="toggle-row">
      <button class="toggle-btn" onclick="toggleMed(this, 'vyvanse')">Vyvanse</button>
      <button class="toggle-btn" onclick="toggleMed(this, 'pilule')">Pilule</button>
    </div>
    <div style="margin-top:10px;">
      <label>Heure de prise du Vyvanse</label>
      <div class="time-row"><input type="time" id="timeVyvanse"></div>
    </div>
  </div>

  <div class="card">
    <h2>😊 Humeur générale</h2>
    <div class="emoji-row" id="moodRow">
      <button class="emoji-btn" onclick="selectEmoji('mood', this, '😔')">😔</button>
      <button class="emoji-btn" onclick="selectEmoji('mood', this, '😕')">😕</button>
      <button class="emoji-btn" onclick="selectEmoji('mood', this, '😐')">😐</button>
      <button class="emoji-btn" onclick="selectEmoji('mood', this, '🙂')">🙂</button>
      <button class="emoji-btn" onclick="selectEmoji('mood', this, '😁')">😁</button>
    </div>
  </div>

  <div class="card">
    <h2>⚡ Niveau d'énergie</h2>
    <div class="emoji-row" id="energyRow">
      <button class="emoji-btn" onclick="selectEmoji('energy', this, '🪫')">🪫</button>
      <button class="emoji-btn" onclick="selectEmoji('energy', this, '😴')">😴</button>
      <button class="emoji-btn" onclick="selectEmoji('energy', this, '😑')">😑</button>
      <button class="emoji-btn" onclick="selectEmoji('energy', this, '💪')">💪</button>
      <button class="emoji-btn" onclick="selectEmoji('energy', this, '🚀')">🚀</button>
    </div>
  </div>

  <div class="card">
    <h2>🤕 Symptômes</h2>
    <div class="toggle-row">
      <button class="toggle-btn" onclick="toggleSymp(this, 'maux-tete')">Mal de tête</button>
      <button class="toggle-btn" onclick="toggleSymp(this, 'nausee')">Nausée</button>
      <button class="toggle-btn" onclick="toggleSymp(this, 'fatigue')">Fatigue</button>
    </div>
  </div>

  <div class="card">
    <h2>📝 Note rapide</h2>
    <textarea id="noteField" placeholder="Comment tu te sens? Quelque chose d'inhabituel?"></textarea>
  </div>

  <button class="save-btn" onclick="saveEntry()">Sauvegarder ✓</button>
</div>

<!-- LOG PAGE -->
<div id="log" class="page">
  <div id="logList"></div>
</div>

<div class="toast" id="toast">Entrée sauvegardée ✓</div>

<script>
  // State
  let state = { mood: '', energy: '', meds: [], symptoms: [] };

  function showPage(id, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
    if (id === 'log') renderLog();
  }

  function selectEmoji(type, btn, val) {
    const rowId = type === 'mood' ? 'moodRow' : 'energyRow';
    document.querySelectorAll(`#${rowId} .emoji-btn`).forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    state[type] = val;
  }

  function toggleMed(btn, med) {
    btn.classList.toggle('selected');
    if (state.meds.includes(med)) state.meds = state.meds.filter(m => m !== med);
    else state.meds.push(med);
  }

  function toggleSymp(btn, symp) {
    btn.classList.toggle('selected');
    if (state.symptoms.includes(symp)) state.symptoms = state.symptoms.filter(s => s !== symp);
    else state.symptoms.push(symp);
  }

  function saveEntry() {
    const entry = {
      id: Date.now(),
      datetime: new Date().toLocaleString('fr-CA'),
      mood: state.mood,
      energy: state.energy,
      meds: [...state.meds],
      timeVyvanse: document.getElementById('timeVyvanse').value,
      symptoms: [...state.symptoms],
      note: document.getElementById('noteField').value.trim()
    };

    const entries = getEntries();
    entries.unshift(entry);
    localStorage.setItem('lea_journal', JSON.stringify(entries));

    // Reset
    state = { mood: '', energy: '', meds: [], symptoms: [] };
    document.querySelectorAll('.emoji-btn, .toggle-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('noteField').value = '';
    document.getElementById('timeVyvanse').value = '';

    showToast();
  }

  function getEntries() {
    try { return JSON.parse(localStorage.getItem('lea_journal')) || []; }
    catch { return []; }
  }

  function renderLog() {
    const entries = getEntries();
    const list = document.getElementById('logList');
    if (!entries.length) {
      list.innerHTML = '<p class="empty">Aucune entrée pour l\'instant.<br>Commence par ajouter une entrée! 💜</p>';
      return;
    }
    list.innerHTML = entries.map(e => `
      <div class="entry">
        <button class="del-btn" onclick="deleteEntry(${e.id})">🗑</button>
        <div class="entry-date">📅 ${e.datetime}</div>
        <div class="entry-row">
          ${e.mood ? `<span class="entry-pill">Humeur ${e.mood}</span>` : ''}
          ${e.energy ? `<span class="entry-pill">Énergie ${e.energy}</span>` : ''}
          ${e.meds.length ? `<span class="entry-pill">💊 ${e.meds.join(', ')}</span>` : ''}
          ${e.timeVyvanse ? `<span class="entry-pill">⏰ ${e.timeVyvanse}</span>` : ''}
          ${e.symptoms.length ? `<span class="entry-pill">⚠️ ${e.symptoms.join(', ')}</span>` : ''}
        </div>
        ${e.note ? `<div class="entry-note">"${e.note}"</div>` : ''}
      </div>
    `).join('');
  }

  function deleteEntry(id) {
    const entries = getEntries().filter(e => e.id !== id);
    localStorage.setItem('lea_journal', JSON.stringify(entries));
    renderLog();
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // Default time to now
  const now = new Date();
  document.getElementById('timeVyvanse').value =
    now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
</script>
</body>
</html>
